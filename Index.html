<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Mes Médicaments</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #252540;
      --text: #e8e8f0;
      --text-muted: #888899;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    .c0 { --mc: #7c6af7; --ms: rgba(124,106,247,0.2); --mg: rgba(124,106,247,0.08); }
    .c1 { --mc: #f76ac8; --ms: rgba(247,106,200,0.2); --mg: rgba(247,106,200,0.08); }
    .c2 { --mc: #6af7b8; --ms: rgba(106,247,184,0.2); --mg: rgba(106,247,184,0.08); }
    .c3 { --mc: #f7c96a; --ms: rgba(247,201,106,0.2); --mg: rgba(247,201,106,0.08); }
    .c4 { --mc: #6ab8f7; --ms: rgba(106,184,247,0.2); --mg: rgba(106,184,247,0.08); }
    .c5 { --mc: #f76a6a; --ms: rgba(247,106,106,0.2); --mg: rgba(247,106,106,0.08); }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; user-select:none; }

    .app {
      display:flex; flex-direction:column;
      height:100vh; height:100dvh;
      max-width:480px; margin:0 auto;
      background:var(--bg); position:relative; overflow:hidden;
    }
    .app::before {
      content:''; position:fixed; top:-30%; left:-20%; width:70%; height:70%;
      background:radial-gradient(ellipse,rgba(124,106,247,0.1) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* HEADER */
    .header {
      position:relative; z-index:10;
      padding:50px 18px 12px;
      display:flex; align-items:center; gap:8px;
    }
    .header-center { flex:1; text-align:center; }
    .month-label { font-family:'Fraunces',serif; font-size:24px; font-weight:600; text-transform:capitalize; }
    .year-label { font-size:12px; color:var(--text-muted); }
    .nav-btn {
      width:40px; height:40px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
      color:var(--text); font-size:18px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; flex-shrink:0;
    }
    .nav-btn:active { background:rgba(124,106,247,0.2); transform:scale(0.9); }
    .settings-btn {
      width:40px; height:40px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
      color:var(--text-muted); font-size:16px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.2s; flex-shrink:0;
    }
    .settings-btn:active { background:rgba(255,255,255,0.1); transform:scale(0.9); }

    /* LEGEND */
    .legend {
      position:relative; z-index:10;
      display:flex; flex-wrap:wrap; gap:6px 12px;
      padding:0 18px 10px; justify-content:center;
    }
    .legend-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-muted); }
    .legend-dot { width:8px; height:8px; border-radius:50%; background:var(--mc); }

    /* DAY NAMES */
    .day-names {
      position:relative; z-index:10;
      display:grid; grid-template-columns:repeat(7,1fr);
      padding:0 10px; margin-bottom:4px;
    }
    .day-name { text-align:center; font-size:10px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; padding:3px 0; }
    .day-name.weekend { color:rgba(247,106,200,0.5); }

    /* CALENDAR */
    .calendar-scroll { position:relative; z-index:10; flex:1; overflow-y:auto; padding:0 10px; -webkit-overflow-scrolling:touch; }
    .calendar-scroll::-webkit-scrollbar { display:none; }
    .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }

    .day-cell {
      aspect-ratio:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      border-radius:10px; background:var(--surface);
      position:relative; cursor:pointer;
      transition:transform 0.15s; min-height:42px; gap:2px; overflow:hidden;
    }
    .day-cell.empty { background:transparent; cursor:default; pointer-events:none; }
    .day-cell.today { box-shadow:0 0 0 2px #7c6af7; background:rgba(124,106,247,0.1); }
    .day-cell.future { opacity:0.38; cursor:default; pointer-events:none; }
    .day-cell:not(.empty):active { transform:scale(0.86); }
    .day-num { font-size:12px; font-weight:500; line-height:1; }
    .day-cell.today .day-num { color:#a89df9; font-weight:600; }

    .dots { display:flex; gap:3px; align-items:center; flex-wrap:wrap; justify-content:center; max-width:88%; }
    .dot {
      width:5px; height:5px; border-radius:50%;
      border:1.5px solid var(--mc);
      transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1); transform:scale(0.55);
    }
    .dot.active { background:var(--mc); transform:scale(1); box-shadow:0 0 4px var(--mc); }

    /* BOTTOM */
    .bottom-panel {
      position:relative; z-index:10;
      padding:10px 14px calc(12px + var(--safe-bottom));
    }
    .today-card {
      background:var(--surface2); border-radius:var(--radius);
      padding:13px 15px; border:1px solid rgba(255,255,255,0.07);
    }
    .today-title { font-family:'Fraunces',serif; font-size:13px; font-weight:600; margin-bottom:9px; color:var(--text); }
    .today-btns { display:flex; gap:7px; flex-wrap:wrap; }
    .med-btn {
      flex:1; min-width:54px; padding:7px 5px; border-radius:9px;
      border:1.5px solid var(--mc); background:transparent; color:var(--text);
      cursor:pointer; font-family:'DM Sans',sans-serif;
      display:flex; flex-direction:column; align-items:center; gap:2px;
      transition:all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .med-btn.checked { background:var(--mc); box-shadow:0 3px 10px var(--ms); }
    .med-btn:active { transform:scale(0.88); }
    .med-btn-icon { font-size:15px; }
    .med-btn-label { color:var(--text-muted); font-size:9px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
    .med-btn.checked .med-btn-label { color:rgba(255,255,255,0.85); }

    /* MODAL JOUR */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.65);
      backdrop-filter:blur(8px); z-index:100;
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal {
      width:100%; max-width:480px; margin:0 auto;
      background:var(--surface2); border-radius:22px 22px 0 0;
      padding:18px 20px calc(26px + var(--safe-bottom));
      transform:translateY(100%);
      transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
      border-top:1px solid rgba(255,255,255,0.1);
      max-height:82vh; overflow-y:auto;
    }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-handle { width:34px; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; margin:0 auto 14px; }
    .modal-date { font-family:'Fraunces',serif; font-size:19px; font-weight:600; text-align:center; margin-bottom:3px; text-transform:capitalize; }
    .modal-subtitle { font-size:11.5px; color:var(--text-muted); text-align:center; margin-bottom:18px; }
    .modal-meds { display:flex; flex-direction:column; gap:9px; }
    .modal-med-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:13px 15px; border-radius:11px;
      background:rgba(255,255,255,0.04); border:1.5px solid rgba(255,255,255,0.07);
      cursor:pointer; transition:all 0.2s;
    }
    .modal-med-row.checked { border-color:var(--mc); background:var(--mg); }
    .modal-med-row:active { transform:scale(0.97); }
    .modal-med-info { display:flex; align-items:center; gap:10px; }
    .modal-med-icon { width:32px; height:32px; border-radius:50%; background:var(--ms); display:flex; align-items:center; justify-content:center; font-size:15px; }
    .modal-med-name { font-size:13.5px; font-weight:500; }
    .modal-med-hint { font-size:10.5px; color:var(--text-muted); margin-top:1px; }
    .check-circle {
      width:25px; height:25px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.15);
      display:flex; align-items:center; justify-content:center;
      font-size:12px; transition:all 0.2s; color:transparent;
    }
    .modal-med-row.checked .check-circle { background:var(--mc); border-color:var(--mc); color:white; }
    .modal-close {
      margin-top:14px; width:100%; padding:12px; border-radius:11px;
      border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
      color:var(--text-muted); font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer;
    }
    .modal-close:active { background:rgba(255,255,255,0.1); }

    /* SETTINGS */
    .settings-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      backdrop-filter:blur(10px); z-index:200;
      display:flex; align-items:flex-end;
      opacity:0; pointer-events:none; transition:opacity 0.3s;
    }
    .settings-overlay.open { opacity:1; pointer-events:all; }
    .settings-panel {
      width:100%; max-width:480px; margin:0 auto;
      background:var(--surface2); border-radius:22px 22px 0 0;
      padding:18px 20px calc(26px + var(--safe-bottom));
      transform:translateY(100%);
      transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
      border-top:1px solid rgba(255,255,255,0.1);
      max-height:90vh; overflow-y:auto;
    }
    .settings-overlay.open .settings-panel { transform:translateY(0); }
    .settings-title { font-family:'Fraunces',serif; font-size:19px; font-weight:600; text-align:center; margin-bottom:3px; }
    .settings-sub { font-size:11.5px; color:var(--text-muted); text-align:center; margin-bottom:18px; }
    .med-list { display:flex; flex-direction:column; gap:9px; margin-bottom:12px; }
    .med-edit-row {
      display:flex; align-items:center; gap:10px;
      padding:12px 14px; border-radius:11px;
      background:rgba(255,255,255,0.04); border:1.5px solid rgba(255,255,255,0.08);
    }
    .med-color-dot { width:13px; height:13px; border-radius:50%; background:var(--mc); flex-shrink:0; }
    .med-name-input {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; min-width:0;
    }
    .med-name-input::placeholder { color:var(--text-muted); }
    .del-btn {
      width:28px; height:28px; border-radius:50%;
      border:1.5px solid rgba(247,106,106,0.3); background:rgba(247,106,106,0.08);
      color:#f76a6a; font-size:16px; cursor:pointer;
      display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0;
    }
    .del-btn:active { background:rgba(247,106,106,0.25); transform:scale(0.9); }
    .add-med-btn {
      width:100%; padding:12px; border-radius:11px;
      border:1.5px dashed rgba(124,106,247,0.4); background:rgba(124,106,247,0.06);
      color:#a89df9; font-size:13px; font-family:'DM Sans',sans-serif;
      cursor:pointer; transition:all 0.2s; margin-bottom:12px;
    }
    .add-med-btn:active { background:rgba(124,106,247,0.15); }
    .add-med-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .save-btn {
      width:100%; padding:13px; border-radius:11px;
      border:none; background:#7c6af7; color:white;
      font-size:14px; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s;
    }
    .save-btn:active { transform:scale(0.97); opacity:0.9; }

    /* TOAST */
    .toast {
      position:fixed; top:54px; left:50%;
      transform:translateX(-50%) translateY(-14px);
      background:var(--surface2); border:1px solid rgba(255,255,255,0.12);
      border-radius:22px; padding:8px 16px; font-size:12.5px;
      z-index:400; opacity:0; transition:all 0.3s;
      white-space:nowrap; pointer-events:none;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="header-center">
      <div class="month-label" id="monthLabel"></div>
      <div class="year-label" id="yearLabel"></div>
    </div>
    <button class="nav-btn" id="nextBtn">›</button>
    <button class="settings-btn" id="settingsBtn">⚙</button>
  </div>

  <div class="legend" id="legend"></div>

  <div class="day-names">
    <div class="day-name">Lun</div><div class="day-name">Mar</div>
    <div class="day-name">Mer</div><div class="day-name">Jeu</div>
    <div class="day-name">Ven</div>
    <div class="day-name weekend">Sam</div><div class="day-name weekend">Dim</div>
  </div>

  <div class="calendar-scroll"><div class="grid" id="calGrid"></div></div>

  <div class="bottom-panel">
    <div class="today-card">
      <div class="today-title">Aujourd'hui</div>
      <div class="today-btns" id="todayBtns"></div>
    </div>
  </div>
</div>

<!-- Modal jour -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-subtitle" id="modalSub">Toucher pour cocher / décocher</div>
    <div class="modal-meds" id="modalMeds"></div>
    <button class="modal-close" onclick="closeModal()">Fermer</button>
  </div>
</div>

<!-- Settings -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings(event)">
  <div class="settings-panel">
    <div class="modal-handle"></div>
    <div class="settings-title">Mes médicaments</div>
    <div class="settings-sub">Modifiez les noms, ajoutez ou supprimez</div>
    <div class="med-list" id="medList"></div>
    <button class="add-med-btn" id="addMedBtn" onclick="addMed()">+ Ajouter un médicament</button>
    <button class="save-btn" onclick="saveSettings()">Enregistrer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COLORS = ['c0','c1','c2','c3','c4','c5'];
  const STORAGE_KEY = 'medtracker_v3';

  let meds = [];    // [{name, color}]
  let checks = {};  // { "YYYY-MM-DD": [bool, bool, ...] }
  let viewYear, viewMonth, modalDateKey = null;
  let tempMeds = [];

  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();

  // ── Persistence ──
  function load() {
    try {
      const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (raw) { meds = raw.meds || []; checks = raw.checks || {}; }
    } catch {}
    if (!meds.length) meds = [{name:'Médicament 1',color:'c0'},{name:'Médicament 2',color:'c1'}];
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({meds, checks})); } catch {}
  }

  // ── Utils ──
  function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function todayKey(){ return dateKey(now.getFullYear(),now.getMonth(),now.getDate()); }
  function isToday(y,m,d){ return y===now.getFullYear()&&m===now.getMonth()&&d===now.getDate(); }
  function isFuture(y,m,d){ const c=new Date(y,m,d); c.setHours(0,0,0,0); const t=new Date(); t.setHours(0,0,0,0); return c>t; }
  function getChecks(k){ const a=[...(checks[k]||[])]; while(a.length<meds.length) a.push(false); return a.slice(0,meds.length); }
  function setCheck(k,i,v){ const a=getChecks(k); a[i]=v; checks[k]=a; save(); }

  function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

  // ── Legend ──
  function renderLegend(){
    document.getElementById('legend').innerHTML = meds.map(m=>
      `<div class="legend-item ${m.color}"><div class="legend-dot"></div><span>${m.name}</span></div>`
    ).join('');
  }

  // ── Calendar ──
  function renderCalendar(){
    const M=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    document.getElementById('monthLabel').textContent=M[viewMonth];
    document.getElementById('yearLabel').textContent=viewYear;

    const grid=document.getElementById('calGrid');
    grid.innerHTML='';
    let fd=new Date(viewYear,viewMonth,1).getDay();
    fd=(fd+6)%7;
    const days=new Date(viewYear,viewMonth+1,0).getDate();

    for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='day-cell empty';grid.appendChild(e);}

    for(let d=1;d<=days;d++){
      const k=dateKey(viewYear,viewMonth,d);
      const arr=getChecks(k);
      const today=isToday(viewYear,viewMonth,d);
      const future=isFuture(viewYear,viewMonth,d);

      const cell=document.createElement('div');
      cell.className='day-cell'+(today?' today':'')+(future?' future':'');
      const dotsHtml=meds.map((m,i)=>`<div class="dot ${m.color}${arr[i]?' active':''}"></div>`).join('');
      cell.innerHTML=`<div class="day-num">${d}</div><div class="dots">${dotsHtml}</div>`;
      if(!future) cell.onclick=()=>openModal(viewYear,viewMonth,d);
      grid.appendChild(cell);
    }
    renderLegend();
    renderTodayBtns();
  }

  // ── Today buttons ──
  function renderTodayBtns(){
    const arr=getChecks(todayKey());
    document.getElementById('todayBtns').innerHTML=meds.map((m,i)=>
      `<button class="med-btn ${m.color}${arr[i]?' checked':''}" onclick="toggleToday(${i})">
        <span class="med-btn-icon">💊</span>
        <span class="med-btn-label">${m.name}</span>
      </button>`
    ).join('');
  }

  function toggleToday(i){
    const k=todayKey(); const arr=getChecks(k); const v=!arr[i];
    setCheck(k,i,v); renderCalendar();
    showToast(v?`${meds[i].name} coché ✓`:`${meds[i].name} décoché`);
  }

  // ── Modal jour ──
  function openModal(y,m,d){
    modalDateKey=dateKey(y,m,d);
    const DAYS=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
    const MTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
    const dt=new Date(y,m,d);
    document.getElementById('modalDate').textContent=isToday(y,m,d)?"Aujourd'hui":`${DAYS[dt.getDay()]} ${d} ${MTHS[m]}`;
    updateModalMeds();
    document.getElementById('modalOverlay').classList.add('open');
  }

  function updateModalMeds(){
    const arr=getChecks(modalDateKey);
    document.getElementById('modalMeds').innerHTML=meds.map((m,i)=>
      `<div class="modal-med-row ${m.color}${arr[i]?' checked':''}" onclick="toggleModal(${i})">
        <div class="modal-med-info">
          <div class="modal-med-icon">💊</div>
          <div>
            <div class="modal-med-name">${m.name}</div>
            <div class="modal-med-hint">Toucher pour cocher / décocher</div>
          </div>
        </div>
        <div class="check-circle">✓</div>
      </div>`
    ).join('');
  }

  function toggleModal(i){
    const arr=getChecks(modalDateKey); const v=!arr[i];
    setCheck(modalDateKey,i,v); updateModalMeds(); renderCalendar();
    showToast(v?`${meds[i].name} coché ✓`:`${meds[i].name} décoché`);
  }

  function closeModal(e){
    if(e&&e.target!==document.getElementById('modalOverlay'))return;
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // ── Settings ──
  function openSettings(){
    tempMeds=meds.map(m=>({...m}));
    renderMedList();
    document.getElementById('settingsOverlay').classList.add('open');
  }

  function renderMedList(){
    document.getElementById('addMedBtn').disabled=tempMeds.length>=6;
    document.getElementById('medList').innerHTML=tempMeds.map((m,i)=>
      `<div class="med-edit-row ${m.color}">
        <div class="med-color-dot"></div>
        <input class="med-name-input" type="text" value="${m.name}"
          placeholder="Nom du médicament"
          oninput="tempMeds[${i}].name=this.value" maxlength="30"/>
        ${tempMeds.length>1?`<button class="del-btn" onclick="deleteMed(${i})">×</button>`:''}
      </div>`
    ).join('');
  }

  function addMed(){
    if(tempMeds.length>=6)return;
    tempMeds.push({name:`Médicament ${tempMeds.length+1}`,color:COLORS[tempMeds.length%6]});
    renderMedList();
  }

  function deleteMed(i){
    if(tempMeds.length<=1)return;
    tempMeds.splice(i,1);
    // Réassigner les couleurs
    tempMeds=tempMeds.map((m,idx)=>({...m,color:COLORS[idx%6]}));
    renderMedList();
  }

  function saveSettings(){
    for(const m of tempMeds){ if(!m.name.trim()){ showToast('⚠ Le nom ne peut pas être vide'); return; } }
    const oldLen=meds.length, newLen=tempMeds.length;
    meds=tempMeds.map(m=>({...m,name:m.name.trim()}));
    if(newLen!==oldLen){
      Object.keys(checks).forEach(k=>{
        let a=checks[k];
        while(a.length<newLen)a.push(false);
        checks[k]=a.slice(0,newLen);
      });
    }
    save(); renderCalendar(); closeSettings();
    showToast('✓ Médicaments mis à jour');
  }

  function closeSettings(e){
    if(e&&e.target!==document.getElementById('settingsOverlay'))return;
    document.getElementById('settingsOverlay').classList.remove('open');
  }

  // ── Nav ──
  document.getElementById('prevBtn').onclick=()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} renderCalendar(); };
  document.getElementById('nextBtn').onclick=()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} renderCalendar(); };
  document.getElementById('settingsBtn').onclick=openSettings;

  load();
  renderCalendar();

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
</script>
</body>
</html>
